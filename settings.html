<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>チェックポイント設定</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="settings.css">
</head>
<body class="settings-body">
    <header class="app-bar app-bar--static">
        <a href="index.html" class="app-bar__back" aria-label="戻る">←</a>
        <span class="app-bar__title">チェックポイント設定</span>
    </header>

    <main class="settings-main">
        <p id="settings-message" class="settings-message"></p>
        <div id="checkpoint-list"></div>
        <button id="add-checkpoint" class="settings-button settings-button--secondary">＋ チェックポイントを追加</button>
        <button id="save-checkpoints" class="settings-button">保存する</button>
    </main>

    <div id="map-picker-overlay" class="map-picker-overlay" style="display: none;">
        <div class="map-picker">
            <p class="map-picker__hint">地図をタップして位置を選択してください</p>
            <div id="map-picker"></div>
            <div class="map-picker__actions">
                <button id="map-picker-cancel" class="settings-button settings-button--secondary">キャンセル</button>
                <button id="map-picker-confirm" class="settings-button">この位置にする</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="icons.js"></script>
    <script src="settings.js"></script>
</body>
</html>

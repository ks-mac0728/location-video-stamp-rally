name: Build site from spreadsheet

on:
  schedule:
    # 毎日 6:00 JST (21:00 UTC) に実行
    - cron: '0 21 * * *'
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'content/**'
      - 'scripts/**'
      - 'categories.js'
      - 'amenities.js'
      - 'parking-types.js'
      - 'style.css'
      - 'script.js'
      - 'spot-detail.js'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
        run: npm run build

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "サイトを自動ビルド ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          git push

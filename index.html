<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>動画スタンプラリー</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="map"></div>

    <header class="app-bar">
        <span class="app-bar__title">動画スタンプラリー</span>
        <a href="settings.html" class="app-bar__settings" aria-label="設定">⚙️</a>
    </header>

    <section class="bottom-card">
        <p id="message" class="bottom-card__message">現在地を取得しています…</p>
        <button id="checkin-button" class="checkin-button">チェックイン</button>
    </section>

    <div id="video-container" class="video-overlay" style="display: none;">
        <button id="video-close" class="video-close" aria-label="閉じる">&times;</button>
        <video id="fire-truck-video" playsinline controls>
            お使いのブラウザは動画の再生に対応していません。
        </video>
        <button id="video-tap-to-play" class="video-tap-to-play" style="display: none;">▶ タップして再生</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="icons.js"></script>
    <script src="script.js"></script>
</body>
</html>
